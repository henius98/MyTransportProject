name: Deploy and Release

on:
  push:
    branches: [master]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore MyTransportAppWASM/MyTransportAppWASM.csproj

      - name: Build and Publish
        run: dotnet publish MyTransportAppWASM/MyTransportAppWASM.csproj -c Release -o release --nologo

      - name: Prepare for GitHub Pages
        run: |
          # Copy index.html to 404.html for SPA support
          cp release/wwwroot/index.html release/wwwroot/404.html
          # Add .nojekyll to bypass Jekyll
          touch release/wwwroot/.nojekyll
          # Fix for Blazor .NET 8+ framework script hash issue
          if [ -d "release/wwwroot/_framework" ]; then
            HASHED_JS=$(find release/wwwroot/_framework -name 'blazor.webassembly.*.js' -exec basename {} \; | head -n 1)
            if [ ! -z "$HASHED_JS" ]; then
              sed -i "s/blazor\.webassembly\.js/$HASHED_JS/g" release/wwwroot/index.html
              sed -i "s/blazor\.webassembly\.js/$HASHED_JS/g" release/wwwroot/404.html
            fi
          fi

          # Optional: Add script to handle base href dynamically if needed
          sed -i 's/<base href="\/" \/>/<base href="\/MyTransportProject\/" \/>/g' release/wwwroot/index.html
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: release/wwwroot
          branch: gh-pages

      - name: Package for Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd release/wwwroot
          zip -r ../../MyTransportAppWASM-beta.zip .
          cd ../..

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: MyTransportAppWASM-beta.zip
          prerelease: true
          generate_release_notes: true
