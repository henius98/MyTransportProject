name: Deploy and Release

on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ["v*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Secrets into appsettings.json
        run: |
          sed -i 's/__GOOGLE_CLIENT_ID__/${{ secrets.GOOGLE_CLIENT_ID }}/g' MyTransportAppWASM/wwwroot/appsettings.json
          sed -i 's/__GOOGLE_MAPS_API_KEY__/${{ secrets.GOOGLE_MAPS_API_KEY }}/g' MyTransportAppWASM/wwwroot/appsettings.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore workloads
        run: dotnet workload restore MyTransportAppWASM/MyTransportAppWASM.csproj

      - name: Restore dependencies
        run: dotnet restore MyTransportAppWASM/MyTransportAppWASM.csproj

      - name: Build and Publish
        run: dotnet publish MyTransportAppWASM/MyTransportAppWASM.csproj -c Release -o release --nologo

      - name: Prepare for GitHub Pages
        run: |
          # Copy index.html to 404.html for SPA support
          cp release/wwwroot/index.html release/wwwroot/404.html
          # Add .nojekyll to bypass Jekyll
          touch release/wwwroot/.nojekyll

          # Optional: Add script to handle base href dynamically if needed
          sed -i 's/<base href="\/" \/>/<base href="\/MyTransportProject\/" \/>/g' release/wwwroot/index.html
          sed -i 's/<base href="\/" \/>/<base href="\/MyTransportProject\/" \/>/g' release/wwwroot/404.html

          # Fix SPA 404s by creating physical paths for known routes
          for path in "map" "weather" "settings" "authentication/login" "authentication/login-callback" "authentication/login-failed" "authentication/logout" "authentication/logout-callback" "authentication/logout-failed" "authentication/logged-out"; do
            mkdir -p release/wwwroot/$path
            cp release/wwwroot/index.html release/wwwroot/$path/index.html
          done
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: release/wwwroot
          branch: gh-pages

      - name: Package for Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd release/wwwroot
          zip -r ../../MyTransportAppWASM-beta.zip .
          cd ../..

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: MyTransportAppWASM-beta.zip
          prerelease: true
          generate_release_notes: true
